services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epay_app
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-epay}
      DB_PREFIX: ${DB_PREFIX:-pay}
    ports:
      - "8080:80"
    volumes:
      - app_uploads:/var/www/html/assets/cache
      - app_logs:/var/www/html/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  app_uploads:
  app_logs:
